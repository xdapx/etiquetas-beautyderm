<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etiquetas Beauty Derm</title>
  <script src="lib/tailwind.js"></script>
  <script src="lib/react.min.js"></script>
  <script src="lib/react-dom.min.js"></script>
  <script src="lib/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    // Iconos (SVG de lucide, embebidos para funcionar sin internet)
    const mkIcon = (paths) => ({ size = 24, className = '' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
        className={className} dangerouslySetInnerHTML={{ __html: paths }} />
    );
    const Printer   = mkIcon('<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/>');
    const Plus      = mkIcon('<path d="M5 12h14"/><path d="M12 5v14"/>');
    const Trash2    = mkIcon('<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>');
    const Edit3     = mkIcon('<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/>');
    const Store     = mkIcon('<path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/>');
    const Truck     = mkIcon('<path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/>');
    const Bike      = mkIcon('<circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/>');

    function App() {
      const [formData, setFormData] = useState({
        orderId: '',
        name: '',
        address: '',
        phone: '',
        products: [],
        deliveryMethod: 'envio' // 'envio', 'retiro' o 'motoapp'
      });

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleProductChange = (index, field, value) => {
        const newProducts = [...formData.products];
        newProducts[index][field] = value;
        setFormData(prev => ({ ...prev, products: newProducts }));
      };

      const addProduct = () => {
        setFormData(prev => ({ ...prev, products: [...prev.products, { name: '', qty: '1' }] }));
      };

      const removeProduct = (index) => {
        const newProducts = formData.products.filter((_, i) => i !== index);
        setFormData(prev => ({ ...prev, products: newProducts }));
      };

      // Impresión directa: los estilos @media print ocultan todo menos la etiqueta
      const handlePrint = () => {
        window.print();
      };

      // Estilos CSS para la impresión
      const printStyles = `
        @page {
          size: 100mm 150mm;
          margin: 0;
        }
        @media print {
          html, body { width: 100mm; height: 150mm; overflow: hidden; }
          body * { visibility: hidden; }
          #printable-area, #printable-area * { visibility: visible; }
          #printable-area {
            position: fixed;
            left: 0;
            top: 0;
            width: 100mm;
            height: 150mm;
            margin: 0;
            padding: 15px !important;
            box-sizing: border-box;
            border: none !important;
            box-shadow: none !important;
            background: white;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
          }
        }
      `;

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans flex flex-col items-center">
          <style>{printStyles}</style>

          <div className="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-8 hide-on-print">

            {/* COLUMNA IZQUIERDA: CONTROLES */}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
              <h1 className="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                <Edit3 className="text-blue-600" /> Creador de Etiquetas
              </h1>

              {/* Formulario Manual */}
              <div>
                <h3 className="text-lg font-semibold text-gray-800 mb-4">Datos del Pedido</h3>

                {/* Método de Entrega */}
                <div className="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-2">Método de Entrega</label>
                  <div className="flex gap-2">
                    <label className={`flex-1 flex flex-col items-center justify-center gap-1 p-2 rounded-md cursor-pointer border transition-colors text-xs ${formData.deliveryMethod === 'envio' ? 'bg-blue-100 border-blue-500 text-blue-800 font-bold' : 'bg-white border-gray-300 text-gray-600 hover:bg-gray-50'}`}>
                      <input type="radio" name="deliveryMethod" value="envio" checked={formData.deliveryMethod === 'envio'} onChange={handleInputChange} className="hidden" />
                      <Truck size={18} /> Envío
                    </label>
                    <label className={`flex-1 flex flex-col items-center justify-center gap-1 p-2 rounded-md cursor-pointer border transition-colors text-xs ${formData.deliveryMethod === 'retiro' ? 'bg-black border-black text-white font-bold' : 'bg-white border-gray-300 text-gray-600 hover:bg-gray-50'}`}>
                      <input type="radio" name="deliveryMethod" value="retiro" checked={formData.deliveryMethod === 'retiro'} onChange={handleInputChange} className="hidden" />
                      <Store size={18} /> Sucursal
                    </label>
                    <label className={`flex-1 flex flex-col items-center justify-center gap-1 p-2 rounded-md cursor-pointer border transition-colors text-xs ${formData.deliveryMethod === 'motoapp' ? 'bg-yellow-400 border-yellow-500 text-black font-bold' : 'bg-white border-gray-300 text-gray-600 hover:bg-gray-50'}`}>
                      <input type="radio" name="deliveryMethod" value="motoapp" checked={formData.deliveryMethod === 'motoapp'} onChange={handleInputChange} className="hidden" />
                      <Bike size={18} /> Moto App
                    </label>
                  </div>
                </div>

                <div className="mb-4">
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">Nº Pedido</label>
                  <input type="text" name="orderId" value={formData.orderId} onChange={handleInputChange} className="w-full border rounded-md p-2 text-gray-800 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Ej: 22467" />
                </div>

                <div className="mb-4">
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">Nombre del Cliente</label>
                  <input type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full border rounded-md p-2 text-gray-800 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Nombre completo" />
                </div>

                <div className="mb-4">
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">
                    {formData.deliveryMethod === 'envio' ? 'Dirección de Envío' : 'Datos de Facturación'}
                  </label>
                  <textarea name="address" value={formData.address} onChange={handleInputChange} rows="3" className="w-full border rounded-md p-2 text-gray-800 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none" placeholder="Calle, Número, Piso, Barrio..."></textarea>
                </div>

                <div className="mb-4">
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-1">Teléfono</label>
                  <input type="text" name="phone" value={formData.phone} onChange={handleInputChange} className="w-full border rounded-md p-2 text-gray-800 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="+5411..." />
                </div>

                <div className="mb-4">
                  <label className="block text-xs font-semibold text-gray-600 uppercase mb-2">Productos a enviar</label>
                  {formData.products.map((product, index) => (
                    <div key={index} className="flex gap-2 mb-2 items-start">
                      <input type="text" value={product.name} onChange={(e) => handleProductChange(index, 'name', e.target.value)} className="flex-grow border rounded-md p-2 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Nombre del producto" />
                      <input type="text" value={product.qty} onChange={(e) => handleProductChange(index, 'qty', e.target.value)} className="w-16 border rounded-md p-2 text-sm text-center bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Cant." />
                      <button onClick={() => removeProduct(index)} className="p-2 text-red-500 hover:bg-red-50 rounded-md transition-colors" title="Eliminar producto">
                        <Trash2 size={18} />
                      </button>
                    </div>
                  ))}
                  <button onClick={addProduct} className="text-blue-600 text-sm font-medium flex items-center gap-1 mt-2 hover:text-blue-800">
                    <Plus size={16} /> Añadir otro producto
                  </button>
                </div>
              </div>

            </div>

            {/* COLUMNA DERECHA: VISTA PREVIA Y ETIQUETA */}
            <div className="flex flex-col items-center">
              <div className="w-full flex justify-between items-center mb-4">
                <h2 className="text-xl font-bold text-gray-800">Vista Previa (10x15cm)</h2>
                <button
                  onClick={handlePrint}
                  className="bg-green-600 text-white px-6 py-2 rounded-md hover:bg-green-700 font-bold flex items-center gap-2 shadow-sm transition-transform active:scale-95"
                >
                  <Printer size={20} /> Imprimir
                </button>
              </div>

              {/* CONTENEDOR DE LA ETIQUETA (ESTRICTAMENTE 10x15cm) */}
              <div className="bg-gray-200 p-4 rounded-xl shadow-inner w-full flex justify-center overflow-auto">

                <div id="printable-area" className="bg-white relative flex flex-col" style={{ width: '10cm', height: '15cm', padding: '15px', boxSizing: 'border-box', border: '1px solid #e5e7eb' }}>

                  {/* Header con Logo */}
                  <div className="h-24 flex items-center justify-center mb-4 border-b-2 border-black pb-3 shrink-0">
                    <div className="text-center">
                      <h1 className="text-4xl font-extrabold tracking-tighter" style={{ fontFamily: 'system-ui, sans-serif' }}>beauty<span className="font-light">derm</span></h1>
                      <p className="text-[8px] tracking-[0.2em] uppercase mt-1">Centro Médico Estético</p>
                    </div>
                  </div>

                  {/* Número de Pedido */}
                  <div className="mb-4 shrink-0">
                    <h2 className="text-2xl font-extrabold text-black text-center">
                      {formData.orderId ? `PEDIDO #${formData.orderId}` : 'PEDIDO #------'}
                    </h2>
                  </div>

                  {/* Cartel de Retiro en Sucursal */}
                  {formData.deliveryMethod === 'retiro' && (
                    <div className="mb-4 shrink-0 bg-black text-white text-center py-2 rounded">
                      <h3 className="text-lg font-extrabold uppercase tracking-widest">Retiro en Sucursal</h3>
                    </div>
                  )}

                  {/* Cartel de Moto App */}
                  {formData.deliveryMethod === 'motoapp' && (
                    <div className="mb-2 shrink-0 border-2 border-black bg-gray-100 text-black text-center py-2 rounded">
                      <h3 className="text-lg font-extrabold uppercase tracking-widest">RETIRO MOTO APP</h3>
                    </div>
                  )}

                  {/* Datos de Envío / Cliente */}
                  <div className="mb-4 shrink-0">
                    <h3 className="font-bold text-[11px] uppercase text-gray-600 mb-1 text-center">
                      {formData.deliveryMethod === 'envio' ? 'Destinatario:' : 'Cliente:'}
                    </h3>
                    <p className={`font-bold leading-tight uppercase text-center ${formData.deliveryMethod === 'motoapp' ? 'text-2xl mt-4 mb-2' : 'text-base'}`}>
                      {formData.name || 'NOMBRE DEL CLIENTE'}
                    </p>
                    {formData.deliveryMethod === 'envio' && (
                      <p className="text-sm font-medium leading-tight whitespace-pre-wrap mt-1 text-gray-800 text-center">
                        {formData.address || 'Dirección de envío...'}
                      </p>
                    )}
                  </div>

                  {/* Teléfono */}
                  {formData.deliveryMethod !== 'motoapp' && (
                    <div className="mb-5 shrink-0 text-center">
                      <h3 className="font-bold text-[11px] uppercase text-gray-600 mb-1">Teléfono:</h3>
                      <p className="text-base font-bold text-black">{formData.phone || '---'}</p>
                    </div>
                  )}

                  {/* Contenido (Flex grow para ocupar el espacio restante) */}
                  {formData.deliveryMethod !== 'motoapp' ? (
                    <div className="flex-grow min-h-0 flex flex-col">
                      <h3 className="font-bold text-[11px] uppercase text-gray-600 mb-2 border-b border-gray-200 pb-1">Contenido:</h3>
                      <ul className="text-sm font-bold flex-grow overflow-hidden">
                        {formData.products.length > 0 ? (
                          formData.products.map((p, i) => (
                            <li key={i} className="flex justify-between items-center mb-1.5 pb-1.5 border-b border-dashed border-gray-300 last:border-0">
                              <span className="pr-2">{p.name || '-'}</span>
                              <span className="bg-black text-white px-2 py-0.5 rounded text-[15px] font-bold">x{p.qty}</span>
                            </li>
                          ))
                        ) : (
                          <li className="text-gray-400 font-normal italic">Agrega productos...</li>
                        )}
                      </ul>
                    </div>
                  ) : (
                    <div className="flex-grow min-h-0 flex flex-col items-center justify-center border-t-2 border-dashed border-gray-300 mt-2">
                      <Bike size={50} className="text-gray-300 mb-3" />
                      <p className="text-center text-sm font-bold text-gray-500 uppercase px-4 leading-tight">
                        PAQUETE CERRADO<br /><span className="text-[10px]">ENTREGA A TERCEROS</span>
                      </p>
                    </div>
                  )}

                </div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
